<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Gladsal - керування комерційною нерухомістю в Україні та Європі" />
    <title>Gladsal</title>
    <link rel="icon" type="image/png" href="./img/logo_g.png" />

  <body class="wrapper">
    <div class="test-chart">
      <div class="section-screens--chart fc fdc h100 w100">
        <canvas id="chart-3d"></canvas>
        <span class="chart-percent" data-percent-from="2" data-percent-to="12" style="opacity: 1">2%</span>

      <div class="stop-start-btn fc gg16" style="position: absolute; top: 20px; right: 20px">

        <button id="stop-btn" style="background-color: red; padding: 10px 20px;">Stop</button>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
